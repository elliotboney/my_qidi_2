[gcode_macro M4031]
description: Double reverse homing sequence — reduces Z current to 80%, reverse homes twice with 30mm backoff
gcode:
    G118 Macro M4031 called
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current * 0.8 }
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current * 0.8 }
    REVERSE_HOMING
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current}
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current}
    G91
    G1 Z-30 F600
    G90

    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current * 0.8 }
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current * 0.8 }
    REVERSE_HOMING
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current}
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current}
    G91
    G1 Z-30 F600
    G90

[gcode_macro CUT_FILAMENT_1]
description: Physical filament cut — moves to cutter at X-0.5/Y0.5 and scissors filament with two press cycles
gcode:
    G118 Macro CUT_FILAMENT_1 called
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S10000
    {% if (printer.gcode_move.position.x) < 15 %}
        G1 X15 F9000
        G1 Y0.5 F9000
    {% endif %}
    G1 Y0.5 F15000
    G1 X15 F15000
    G1 X-0.5 F5000
    G4 P1000
    G1 X1 F1000
    G1 X-0.5 F5000
    G4 P1000
    G1 X1 F1000
    G4 P1000
    G1 X15 F3000

[gcode_macro M603]
description: Filament Unload
gcode:
    M1189 Macro M603 Called (Filament Unload)
    DISABLE_ALL_SENSOR
    {% set hotendtemp = params.S|default(250)|int %}
    _CG28
    M104 S{hotendtemp}

    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M1189 Heat up complete

    G92 E0 
    G1 E-10 F300     #退料10mm

    {% if printer.save_variables.variables.box_count > 0 and printer["box_extras"]%}
        E_UNLOAD SLOT=16
    {% else %}
        CUT_FILAMENT_1
        MOVE_TO_TRASH
        G92 E0 
        G1 E-60 F300     #退料60mm
    {% endif %}

    M104 S0

    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000

    M106 S0
    M400
    M1189 Unload finish

[gcode_macro M604]
description: Filament Load
gcode:
    M1189 MACRO M604 Called (Filament Load)
    DISABLE_ALL_SENSOR
    {% set hotendtemp = params.S|default(250)|int %}
    {% set mode = params.T|default(0)|int %}
    {% if mode == 0 %} 
        _CG28
        MOVE_TO_TRASH
    {% endif %}
    {% if printer.save_variables.variables.box_count > 0 and mode == 0 and printer["box_extras"]%}
        M1189 check box filament
        E_LOAD SLOT=16 S={hotendtemp}
    {% endif %}
    {% if mode == 0 %}  # First Filament Load
        M104 S{hotendtemp}
        MOVE_TO_TRASH
        M109 S{hotendtemp}
        M1189 Heat up complete
        G92 E0
        G1 E80 F400
        M400
    {% elif mode ==1 %}      # Retry Send M=1
        MOVE_TO_TRASH
        M109 S{hotendtemp}
        M1189 Heat up complete
        G92 E0
        G1 E80 F400
        M400
    {% endif %}
    M1189 Load finish

[gcode_arcs]
resolution: 1.0

[gcode_macro M109]
description: Wait for hotend temp (override) — uses TEMPERATURE_WAIT with +1C max overshoot window
rename_existing: M99109
gcode:
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
    {% endif %}

[exclude_object]

[gcode_macro G31]
description: Enable adaptive bed mesh mode (sets G29 variable k=1)
gcode:
    SET_GCODE_VARIABLE MACRO=G29 VARIABLE=k VALUE=1

[gcode_macro G32]
description: Enable full bed mesh mode (sets G29 variable k=0)
gcode:
    SET_GCODE_VARIABLE MACRO=G29 VARIABLE=k VALUE=0



[gcode_macro G29]
description: Bed mesh calibration — k=1 for adaptive (KAMP), k=0 for full mesh. Homes, calibrates, saves config
variable_k:1
gcode:
    M1189 G29 Override Macro called 
    BED_MESH_CLEAR
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    {% if k|int==1 %}
        G28   
        BED_MESH_CALIBRATE PROFILE=kamp       
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        # G4 P5000
        # SAVE_CONFIG_QD 
    {% else %}
        {% if printer["bed_mesh"].profiles.default %}
            G28
            BED_MESH_PROFILE LOAD=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
        {% else %}
            G28
            BED_MESH_CALIBRATE PROFILE=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
            G4 P5000
            SAVE_CONFIG_QD
        {% endif %}
    {% endif %}

[gcode_macro M204]
description: Set acceleration (override) — accepts S, or min(P,T). Also sets accel_to_decel to half
rename_existing: M99204
gcode:
    {% if params.S is defined %}
        {% set s = params.S|float %}
    {% endif %}
    {% if params.P is defined %}
    {% if params.T is defined %}
        {% set s = [params.P|float ,params.T|float] | min %}
    {% endif %}
    {% endif %}

    SET_VELOCITY_LIMIT ACCEL={s}
    SET_VELOCITY_LIMIT ACCEL_TO_DECEL={s/2}

[gcode_macro BEEP]
description: Beep the speaker — I=count, DUR=duration(ms). Only sounds if beep variable is enabled
gcode:
    {% set i = params.I|default(1)|int %}
    {% set dur = params.DUR|default(100)|int %}
    {% set beep = printer.save_variables.variables.beep|default(0) %}

    {% if beep == 1 %}
        {% for iteration in range(i|int) %}
            SET_PIN PIN=beeper VALUE=1
            G4 P{dur}
            SET_PIN PIN=beeper VALUE=0
    		G4 P{dur}
        {% endfor %}
    {% endif %}

[gcode_macro beep_on]
description: Enable beeper sounds
gcode:
    SAVE_VARIABLE VARIABLE=beep VALUE=1

[gcode_macro beep_off]
description: Disable beeper sounds
gcode:
    SAVE_VARIABLE VARIABLE=beep VALUE=0

[gcode_macro LED_ON]
