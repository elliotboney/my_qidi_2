[gcode_macro M106]
description: Fan control override — P0=part cooling, P2=auxiliary, P3=chamber circulation, P4=polar cooler (AC)
gcode:
    {% set p = params.P|default(0)|int %}

    {% if p == 2 and printer["fan_generic auxiliary_cooling_fan"] is defined %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED={(params.S|float / 255.0)}
        {% else %}
            SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=1
        {% endif %}
    {% endif %} 

    {% if p == 0 and printer["fan_generic cooling_fan"] is defined %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
            
        {% else %}
            SET_FAN_SPEED FAN=cooling_fan SPEED=1
        {% endif %}
    {% endif %} 

    {% if p == 3 and printer["fan_generic chamber_circulation_fan"] is defined %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=chamber_circulation_fan SPEED={(params.S|float / 255.0)}
        {% else %}
            SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1
        {% endif %}
    {% endif %} 

    {% if p == 4 and printer["output_pin Polar_cooler"] is defined %}
        {% if params.S is defined %}
            SET_PIN PIN=Polar_cooler VALUE={1 if (params.S|int / 255) > 0 else 0}
        {% else %}
            SET_PIN PIN=Polar_cooler VALUE=1
        {% endif %}
    {% endif %}

[gcode_macro M107]
description: Turn off part cooling fan
gcode:  
    SET_FAN_SPEED FAN=cooling_fan SPEED=0

[gcode_macro M303]
description: PID auto-tune — E-1=bed, E0=extruder. Usage: M303 E<heater> S<target_temp>
gcode:
    {% if params.E is defined %}
     {% if params.S is defined %}
        {% if (params.E|int)==-1 %} 
         PID_CALIBRATE HEATER=heater_bed TARGET={params.S|int}
        {% endif %}
        {% if (params.E|int)==0 %}
         PID_CALIBRATE HEATER=extruder TARGET={params.S|int}
        {% endif %}
     {% endif %}
  {% endif %}


[gcode_macro M900]
description: Set pressure advance — K=advance value, T=smooth time. Usage: M900 K<val> T<smooth>
gcode:
    {% if params.K is defined %} 
          SET_PRESSURE_ADVANCE ADVANCE={params.K}
    {% endif %}  
    {% if params.T is defined %}    
       SET_PRESSURE_ADVANCE SMOOTH_TIME={params.T}
    {% endif %} 

[gcode_macro M290]
description: Adjust Z offset by relative amount. Usage: M290 Z<offset>
gcode:
   SET_GCODE_OFFSET Z_ADJUST={params.Z}

[gcode_macro M901]
description: Run full input shaper calibration — homes, calibrates 20-150Hz, saves config
gcode:
    m104 S0        # Turn off hot end
    G28
    SHAPER_CALIBRATE
    M1189 Input shaper complete
    SAVE_CONFIG
       
[gcode_macro M0]
description: Unconditional pause (M0 compatibility alias)
gcode:
    PAUSE

[gcode_macro M25]
description: Pause print (M25 SD card pause compatibility alias)
rename_existing: M9925
gcode:
    PAUSE

[gcode_macro M4029]
description: Full auto-calibration — reverse home, clear nozzle, Z tilt, bed mesh, save config
gcode:
    M1189 M4029 macro called
    {% set bedtemp = params.S|default(60)|float %}
    DISABLE_ALL_SENSOR
    M104 S140
    M140 S{bedtemp}
    SAVE_VARIABLE VARIABLE=z_offset VALUE=0
    SET_GCODE_OFFSET Z=0 MOVE=0
    M4031
    G28 
    M400
    M1189 Position init complete

    CLEAR_NOZZLE HOTEND=260
    M104 S140
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140
    M1189 Nozzle cooled
    Z_TILT_ADJUST
    G28
    G1 z10 F600
    BED_MESH_CALIBRATE
    G0 Z50 F600
    G0 X130 Y130 F9000
    M400
    M1189 Bed mesh calibrate complete
    SAVE_CONFIG


[gcode_macro move_screw1]
description: Move to front-left bed screw position (X30 Y32)
gcode:
    G1 Z5 F600
    G1 X30 Y32 F12000
    G1 Z0 F300

[gcode_macro move_screw2]
description: Move to front-right bed screw position (X240 Y32)
gcode:
    G1 Z5 F600
    G1 X240 Y32 F12000
    G1 Z0 F300
    
[gcode_macro move_screw3]
description: Move to rear-right bed screw position (X240 Y242)
gcode:
    G1 Z5 F600
    G1 X240 Y242 F12000
    G1 Z0 F300

[gcode_macro move_screw4]
description: Move to rear-left bed screw position (X30 Y242)
gcode:
    G1 Z5 F600
    G1 X30 Y242 F12000
    G1 Z0 F300

[gcode_macro M4030]
description: Manual Z calibration — clear mesh, reverse home, home, move to screw position, probe Z
gcode:    
    G118 Macro M4030 called
    BED_MESH_CLEAR      
    SET_GCODE_OFFSET Z=0 MOVE=0
    M4031
    G28
    G1 X240 Y32 F9000
    G28 Z
