[gcode_macro ELLIOT_DEBUG]
description: just tests some debug stuff
gcode:
    RESPOND MSG="Hello, this is a regular RESPOND"
    RESPOND TYPE=echo MSG="Hello, this is an echo RESPOND"
    RESPOND TYPE=command MSG="Hello, this is a command RESPOND"
    RESPOND TYPE=error MSG="Hello, this is an error RESPOND!"
    RESPOND PREFIX=DEBUG MSG="Hello, this is a DEBUG RESPOND"

[gcode_macro M1188]
gcode:
  {% if rawparams %}
    {% set escaped_msg = rawparams.split(';', 1)[0].split('\x23', 1)[0]|replace('"', '\\"') %}
    RESPOND MSG="{escaped_msg}" COLOR=accent
  {% endif %}

[gcode_macro M1189]
gcode:
  {% set debug = printer.save_variables.variables.elliot_debug|default(1)|int %}
  {% if rawparams and debug == 1 %}
    {% set escaped_msg = rawparams.split(';', 1)[0].split('\x23', 1)[0]|replace('"', '\\"') %}
    {% set msg = 'MSG="DEBUG: <span class=secondary--text text--lighten-2>' + escaped_msg + '</span>"'|string %}
    BASE_RESPOND type=command MSG="<span class='blue-grey--text'>DEBUG:</span> <span class='blue-grey--text text--lighten-2'>{escaped_msg}</span>"
  {% endif %}

[gcode_macro ELLIOT_DEBUG_ON]
description: Enable M1189 debug messages (persists across reboots)
gcode:
    SAVE_VARIABLE VARIABLE=elliot_debug VALUE=1
    RESPOND MSG="Elliot debug: ON" COLOR=success

[gcode_macro ELLIOT_DEBUG_OFF]
description: Disable M1189 debug messages (persists across reboots)
gcode:
    SAVE_VARIABLE VARIABLE=elliot_debug VALUE=0
    RESPOND MSG="Elliot debug: OFF" COLOR=secondary

[gcode_macro RESPOND]
rename_existing: BASE_RESPOND
gcode:
  {% set colors = ('primary', 'secondary', 'accent', 'info', 'success', 'error', 'warning') %}

  {% if params.PREFIX is defined %}
    {% set prefix = 'PREFIX=' + params.PREFIX|string %}
  {% endif %}

  {% if params.TYPE is defined %}
      {% if params.TYPE in ('echo', 'echo_no_space', 'command', 'error') and params.TYPE != '' %}    
          {% set type = 'TYPE=' + params.TYPE|string %}
      {% else %}
          BASE_RESPOND TYPE=error MSG="RESPOND TYPE '{params.TYPE}' is invalid. Must be one of 'echo', 'command' or 'error'"
      {% endif %}
  {% endif %}
        
  {% if params.MSG is defined %}   
    {% set msg = 'MSG="'+ params.MSG + '"'|string %}
  {% endif %}

  {% if params.COLOR is defined %}
      {% set color = params.COLOR|lower %}

      {% if color in colors %}
          {% set msg = 'MSG="<span class=' + color + '--text>' + params.MSG + '</span>"'|string %}
  
      {% else %}
          BASE_RESPOND TYPE=error MSG="RESPOND COLOR '{color}' is invalid. Must be one of 'primary', 'secondary', 'accent', 'info', 'success', 'warning' or 'error'"
      {% endif %}
       
  {% endif %}
  BASE_RESPOND {prefix} {type} {msg}

[gcode_macro PRINT_START]
gcode:
    M1189 PRINT_START (new) macro called
    
    # Stop timers
    UPDATE_DELAYED_GCODE ID=SMART_COOLING_MONITOR DURATION=0
    UPDATE_DELAYED_GCODE ID=FILTER_START_ACTION DURATION=0
    UPDATE_DELAYED_GCODE ID=FILTER_STOP DURATION=0

    # Run input shaping calibration (reduces ringing/ghosting artifacts)
    AUTOTUNE_SHAPERS
    # Disable filament runout and other sensors during startup sequence
    DISABLE_ALL_SENSOR
    # Clear any existing pause state
    CLEAR_PAUSE

    # Parse parameters passed from slicer start gcode
    {% set bedtemp = params.get('BED') | int %}
    {% set hotendtemp = params.get('HOTEND') | int %}
    {% set chambertemp = params.get('CHAMBER', 0) | int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set filament_pressure_advance = params.PRESSURE_ADVANCE|default(0.028)|float %}

    M1189 Pressure advance set to {filament_pressure_advance}
    SET_PRESSURE_ADVANCE ADVANCE={filament_pressure_advance}



    SET_GCODE_VARIABLE MACRO=PRINT_END VARIABLE=used_tools_list VALUE="''"
    MARK_TOOL_USED TOOL={extruder}
    {% set active_mat_string = printer["gcode_macro PRINT_END"].active_materials|default("Unknown") %}

    # --- KAMP CALCULATION ---
    {% set margin = 10 %} 
    {% set mesh_min = params.MESH_MIN|default("10,10") %}
    {% set mesh_max = params.MESH_MAX|default("260,260") %}
    {% set x_min = mesh_min.split(",")[0]|float %}
    {% set y_min = mesh_min.split(",")[1]|float %}
    {% set x_max = mesh_max.split(",")[0]|float %}
    {% set y_max = mesh_max.split(",")[1]|float %}
    
    {% set bed_mesh = printer.configfile.settings.bed_mesh %}
    {% set min_limit_x = bed_mesh.mesh_min[0] %}
    {% set min_limit_y = bed_mesh.mesh_min[1] %}
    {% set max_limit_x = bed_mesh.mesh_max[0] %}
    {% set max_limit_y = bed_mesh.mesh_max[1] %}

    {% set x_min = [x_min - margin, min_limit_x] | max %}
    {% set y_min = [y_min - margin, min_limit_y] | max %}
    {% set x_max = [x_max + margin, max_limit_x] | min %}
    {% set y_max = [y_max + margin, max_limit_y] | min %}

    {% set probe_count = bed_mesh.probe_count %}
    {% if probe_count is not iterable %}{% set probe_count = [probe_count, probe_count] %}{% endif %}
    {% set max_x_span = max_limit_x - min_limit_x %}
    {% set max_y_span = max_limit_y - min_limit_y %}
    {% set step_x = max_x_span / (probe_count[0] - 1) %}
    {% set step_y = max_y_span / (probe_count[1] - 1) %}
    {% set obj_x_span = x_max - x_min %}
    {% set obj_y_span = y_max - y_min %}
    {% set points_x = (obj_x_span / step_x)|round(0, 'ceil')|int + 1 %}
    {% set points_y = (obj_y_span / step_y)|round(0, 'ceil')|int + 1 %}

    {% set points_x = [points_x, 3]|max %}
    {% set points_y = [points_y, 3]|max %}
    {% set points_x = [points_x, probe_count[0]]|min %}
    {% set points_y = [points_y, probe_count[1]]|min %}

    {% if (points_x >= 4 and points_y >= 4) and (points_x > 4 or points_y > 4) %}
        {% set algo = "bicubic" %}
    {% else %}
        {% set algo = "lagrange" %}
    {% endif %}

    # --- CONSOLE OUTPUT ---
    {action_respond_info("-----------------------------------------")}
    {action_respond_info(" Qidi Q2 3D Print Start")}
    {action_respond_info(" Material List  : " ~ active_mat_string)}
    {action_respond_info(" Start Tool     : T" ~ extruder)}
    {action_respond_info("-----------------------------------------")}
    {action_respond_info("Qidi Q2 Smart-Mesh: Calculated")}
    {action_respond_info("Algorithm: " ~ algo ~ " | Probes: " ~ points_x ~ "x" ~ points_y)}
    {action_respond_info("Mesh Bounds: " ~ x_min|round(1) ~ "," ~ y_min|round(1) ~ " to " ~ x_max|round(1) ~ "," ~ y_max|round(1))}
    {action_respond_info("Margin applied: " ~ margin ~ "mm")}
    {action_respond_info("Clean Nozzle Strategy: Active")}
    {action_respond_info("KAMP 2.0 for Qidi Q2 successful. Happy KAMPing!")}
    {action_respond_info("-----------------------------------------")}

    M104 S140
    M140 S{bedtemp}      
    M141 S{chambertemp}  
    {% if chambertemp == 0 %} M106 P3 S255 {% endif %}

    G28 # Home all axes
    
    # Clear any Z offset and don't move
    SET_GCODE_OFFSET Z=0 MOVE=0
    # Disable buffer monitoring during initialization
    BUFFER_MONITORING ENABLE=0 

    # Box Check
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %}
        # Reset retry counters for filament load attempts
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        # Clear any leftover toolchange state from previous print
        CLEAR_TOOLCHANGE_STATE

        # Reset runout flags for all 16 possible filament slots
        {% for i in range(16) %} 
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0 
        {% endfor %}

        {% if printer.save_variables.variables.enable_box == 1 %}
            # Initialize Box, load correct extruder, and bring hotend to temp
            BOX_PRINT_START_2 EXTRUDER={extruder} HOTENDTEMP={hotendtemp}
            M400
            # Purge/flush filament through the system
            M1189 Running box purge sequence...
            EXTRUSION_AND_FLUSH HOTEND={hotendtemp}
        {% endif %}
    {% endif %}

    # Run nozzle cleaning routine
    CLEAR_NOZZLE HOTEND={hotendtemp}
    
    # CUT_FILAMENT_1
    # M400

    M104 S140
    M190 S{bedtemp}

    M1189 Running Z_TILT_ADJUST...
    Z_TILT_ADJUST
    G28 Z                
    
    M1189 Running BED_MESH_CALIBRATE
    _BED_MESH_CALIBRATE mesh_min={x_min},{y_min} mesh_max={x_max},{y_max} PROBE_COUNT={points_x},{points_y} ALGORITHM={algo} PROFILE=kamp_Q2

    M1189 Running SMART_PARK
    SMART_PARK

    # Re-enable buffer monitoring now that Box is initialized
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
        BUFFER_MONITORING ENABLE=1
    {% endif %}

    M1189 Waiting on hotend to reach {hotendtemp}
    M109 S{hotendtemp}
    
    # Set max acceleration
    M204 S10000

    # Apply saved Z offset
    set_zoffset

    # Re-enable runout and other sensors now that print is starting
    ENABLE_ALL_SENSOR

    LINE_PURGE

    # Save this file as the last printed (for resume/reprint functionality)
    save_last_file

    M1189 End of PRINT_START macro!

[gcode_macro PRINT_END]
description: Q2 End-Macro with INTELLIGENT Sensor Logic & Tool Detection
variable_active_materials: "Unknown"
variable_used_tools_list: ""
variable_cool_target: 50
gcode:
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set layer_z = params.LAYER_Z|default(250)|int %}
    
    {% if params.EXTRUDER %} # Only execute if called with EXTRUDER parameter (to prevent running during power loss or end of print without filament)
        # 1. Only check used tools
        {% set all_materials = active_materials.split(" ") %}
        {% set used_indices = used_tools_list.split(",") %}
        {% set danger_found = false %}
        {% set detected_danger_type = "" %}
        {% set used_material_names = [] %}

        {% for i in used_indices %}
            {% if i|length > 0 %}
                {% set idx = i|int %}
                {% if idx < all_materials|length %}
                    {% set mat = all_materials[idx].upper() %}
                    {% set _dummy = used_material_names.append(mat) %}
                    # Check for critical materials
                    {% if "ASA" in mat or "ABS" in mat or "PC" in mat or "PA" in mat or "NYLON" in mat or "CARBON" in mat or "PPS" in mat %}
                        {% set danger_found = true %}
                        {% set detected_danger_type = mat %}
                    {% endif %}
                {% endif %}
            {% endif %}
        {% endfor %}
        {% set materials_string = used_material_names|join(", ") %}

        M400
        save_zoffset
        
        # --- MOVEMENTS ---
        G91
        G1 E-3 F1800
        G1 Z10 F600
        G90
        G1 X85 F15000           ; Park at purge chute
        G1 Y287.5 F3000         

        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
        CLEAR_PAUSE
        DISABLE_BOX_HEATER
        M104 S0
        M140 S0
        M141 S0
        M106 P0 S0
        M106 P2 S0
        
        # --- INTELLIGENT COOL-DOWN LOGIC ---
        {% if danger_found %}
            # === HAZARDOUS MATERIAL MODE ===
            M117 Waiting for cooldown ({detected_danger_type})...
            RESPOND TYPE=error MSG="Critical material ({detected_danger_type}) printed. Waiting until chamber < 50C before filtering."
            SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=0.0
            SET_GCODE_VARIABLE MACRO=PRINT_END VARIABLE=cool_target VALUE=50
            UPDATE_DELAYED_GCODE ID=SMART_COOLING_MONITOR DURATION=1
        {% else %}
            # === STANDARD MODE ===
            M117 Done: {materials_string}
            RESPOND TYPE=command MSG="Non-critical material ({materials_string}). Starting 5 min quick ventilation."
            SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1.0
            UPDATE_DELAYED_GCODE ID=FILTER_STOP DURATION=300
        {% endif %}

        M84
        DISABLE_ALL_SENSOR
        {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
            BUFFER_MONITORING ENABLE=0
        {% endif %}
        BED_MESH_CLEAR
        G31
        CLEAR_LAST_FILE
        BEEP I=2 DUR=500
        
        # SDCARD_RESET_FILE # This causes an error
        
        TIMELAPSE_RENDER
        M1189 PRINT_END macro completed successfully.
    {% else %}
        M1189 PRINT_END macro called automatically by the printer (ignoring)
    {% endif %}


[gcode_macro UNLOAD_FILAMENT]
description: Unload Filament 
gcode : 
	M1189 UNLOAD_FILAMENT macro called!
    {% if printer.save_variables.variables.enable_box == 1 %}
        {% set T = params.T|int %}
        CUT_FILAMENT T={T}
        MOVE_TO_TRASH
        UNLOAD_T{T}
        G1 E25 F300
        M104 S0
        CLEAR_OOZE
        CLEAR_FLUSH
	{% endif %}

#ADDED
# Add to start gcode:  ORCA_QIDI_BOX T=[initial_tool]
# T0-3 for QIDI BOX slots 1A-1D.  If more boxes are connected,
# additional tools will be written in the same order.
# Any tool number higher than the configured box slots or -1 
# will disable the BOX and use the rack. 

[gcode_macro ORCA_QIDI_BOX]
description: Configure Qidi Box slot-to-tool mapping from slicer initial tool. T0-T3=slots 1A-1D, T=-1 or out of range disables Box
gcode: 
    # Grab the inital tool number, save to variable t 
    {% set t = params.get('T') | int %}

    # Check if at least one BOX is connected
    {% if printer.save_variables.variables.box_count >= 1 %}

        # Check if initial tool is external spool (not in BOX)
        {% if t >= printer.save_variables.variables.box_count * 4 or t == -1 %}
            # Disable the BOX and desync any synced slots
            SAVE_VARIABLE VARIABLE=enable_box VALUE=0
        {% else %}
            # If initial tool is in range for BOX, enable the BOX
            SAVE_VARIABLE VARIABLE=enable_box VALUE=1

            # Set tools T0 through T3 to slot0 through slot3
            SAVE_VARIABLE VARIABLE=value_t0 VALUE="'slot0'"
            SAVE_VARIABLE VARIABLE=value_t1 VALUE="'slot1'"
            SAVE_VARIABLE VARIABLE=value_t2 VALUE="'slot2'"
            SAVE_VARIABLE VARIABLE=value_t3 VALUE="'slot3'"

            # If additional BOXes are connected, set those tools too
            {% if printer.save_variables.variables.box_count >= 2 %}
                SAVE_VARIABLE VARIABLE=value_t4 VALUE="'slot4'"
                SAVE_VARIABLE VARIABLE=value_t5 VALUE="'slot5'"
                SAVE_VARIABLE VARIABLE=value_t6 VALUE="'slot6'"
                SAVE_VARIABLE VARIABLE=value_t7 VALUE="'slot7'"
            {% endif %}

            {% if printer.save_variables.variables.box_count >= 3 %}
                SAVE_VARIABLE VARIABLE=value_t8 VALUE="'slot8'"
                SAVE_VARIABLE VARIABLE=value_t9 VALUE="'slot9'"
                SAVE_VARIABLE VARIABLE=value_t10 VALUE="'slot10'"
                SAVE_VARIABLE VARIABLE=value_t11 VALUE="'slot11'"
            {% endif %}

            {% if printer.save_variables.variables.box_count == 4 %}
                SAVE_VARIABLE VARIABLE=value_t12 VALUE="'slot12'"
                SAVE_VARIABLE VARIABLE=value_t13 VALUE="'slot13'"
                SAVE_VARIABLE VARIABLE=value_t14 VALUE="'slot14'"
                SAVE_VARIABLE VARIABLE=value_t15 VALUE="'slot15'"
            {% endif %}
        {% endif %}
    {% else %}
        # If no boxes are connected, disable the BOX
        SAVE_VARIABLE VARIABLE=enable_box VALUE=0
    {% endif %}
    

[gcode_macro M191]
description: Set chamber heater to target temperature (non-blocking). Usage: M191 S<temp>
gcode:
    {% set s = params.S|default(0)|int %}
    M1189 Using M191 Override to set chamber temp without waiting
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={s}
    # Simply setting the temp, no waiting (M191)

[gcode_macro CLEAR_NOZZLE]
description: Full nozzle cleaning — purge 80mm, 3-pass brush scrub, circular wipe at 150C, and scrape pass
gcode:
    # ============================================================
    # INIT - Announce macro and set parameters
    # ============================================================
    M1189 CLEAR_NOZZLE macro called!                          # Send status message to console
    {% set hotendtemp = params.HOTEND|default(250)|int %}    # Set hotend temp (default 250C if not passed)

    # ============================================================
    # POSITION - Move to purge/trash zone
    # ============================================================
    MOVE_TO_TRASH                                            # Call macro to move nozzle to trash bucket/purge zone
    M400                                                     # Wait for all moves to complete

    # ============================================================
    # HEAT - Bring hotend up to purge temperature
    # ============================================================
    M1189 Setting nozzle to {hotendtemp} to clear the nozzle 
    M104 S{hotendtemp}                                       # Wait for hotend to reach target temp
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotendtemp-20} # (disabled) Alternative: wait until within 20C of target

    # ============================================================
    # PURGE - Extrude filament to clear nozzle
    # ============================================================
    G92 E0                                                   # Reset extruder position
    G1 E5 F80                                                # Slow extrude 5mm (prime/ooze start)
    G92 E0                                                   # Reset extruder position
    G1 E80 F300                                              # Extrude 80mm to purge old filament
    G92 E0                                                   # Reset extruder position
    G1 E-2 F200                                              # Retract 2mm to reduce ooze
    M400                                                     # Wait for purge moves to complete

    # ============================================================
    # COOL - Begin cooling nozzle for scrubbing
    # ============================================================
    M106 S255                                                # Part cooling fan full blast to help cool nozzle
    G4 P1000                                                 # Dwell 1 second
    M104 S{hotendtemp-30}                                              # Set hotend target to 140C (no wait)
    M1189 Setting extruder to {hotendtemp-30} for scrubbin
    # M109 S{hotendtemp-30}
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={hotendtemp-30} # Wait until hotend drops 30C below purge temp

    # ============================================================
    # SCRUB PASS 1 - Short X oscillations (coarse wipe)
    # ============================================================
    M204 S5000                                               # Set acceleration to 5000mm/s²
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # | Oscillate nozzle back and forth
    G1 X90 F5000                                             # | over scrub brush/pad (X90-103)
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |

    # ============================================================
    # SCRUB PASS 2 - Wider X oscillations (extended wipe)
    # ============================================================
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # |
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # |
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # | Wider oscillation pass
    G1 X114 F5000                                            # | over scrub area (X100-114)
    G1 X100 F5000                                            # |
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # |
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # |
    G1 X114 F5000                                            # |
    G1 X100 F5000                                            # |

    # ============================================================
    # SCRUB PASS 3 - Return to short X oscillations (final wipe)
    # ============================================================
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # | Repeat narrow pass
    G1 X90 F5000                                             # | to finish scrub (X90-103)
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |
    G1 X103 F5000                                            # |
    G1 X90 F5000                                             # |

    # ============================================================
    # REPOSITION - Move to secondary cleaning zone
    # ============================================================
    G1 X125 F15000                                           # Fast move to intermediate X position
    G1 X130 Y280 F6000                                       # Move to cleaning area position
    G1 Z-0.2 F600                                            # Lower Z slightly to press nozzle onto cleaning surface

    # ============================================================
    # COOL WAIT + CIRCULAR WIPE - Wait for lower temp, then scrub in circles
    # ============================================================
    M1189 Setting extruder to 150 for cool wipe
    M104 S150
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150             # Wait until hotend is at or below 150C
    M106 S255                                                # Ensure cooling fan is at full speed
    G2 I0.5 J0.5 F600                                        # |
    G2 I0.5 J0.5 F600                                        # | CW circular wipe (small radius)
    G2 I0.5 J0.5 F600                                        # |
    G1 X140 F200                                             # |
    G1 Y281 F200                                             # | Slow zigzag wipe pattern
    G1 X130 F200                                             # |
    G1 Y283 F200                                             # |
    G1 X140 F200                                             # |
    G2 I0.5 J0.5 F600                                        # |
    G2 I0.5 J0.5 F600                                        # | Second set of CW circular wipes
    G2 I0.5 J0.5 F600                                        # |

    # ============================================================
    # SCRAPE - Drag nozzle tip across surface to remove debris
    # ============================================================
    G1 Z0.2                                                  # Raise Z slightly
    G1 X180 F12000                                           # |
    G1 Z-1.5                                                 # Lower Z to scrape depth
    G1 X164 F12000                                           # |
    G1 X180 F12000                                           # |
    G1 X164 F12000                                           # | Fast X oscillations at scrape depth
    G1 X180 F12000                                           # | to shear off any remaining debris 
    G1 X164 F12000                                           # |
    G1 X180 F12000                                           # |
    G1 X164 F12000                                           # |
    M400                                                     # Wait for all moves to complete

    # ============================================================
    # FINISH - Report done and return to safe position
    # ============================================================
    
    G1 Z30 F900                                              # Raise Z to safe height
    G1 Y10 F18000                                            # Move Y to front of bed (away from cleaning zone)
    G1 X260 F18000                                           # Park X at far end
    M106 S0                                                  # Turn off part cooling fan
    M1189 Nozzle cleared, macro done        
                      # Send completion message to console
[gcode_macro SHAKE_OOZE]
description: Rapid Y oscillation at trash position to shake off ooze from nozzle
gcode:
    M1189 SHAKE_OOZE macro called
    MOVE_TO_TRASH
    
    M204 S2000
    M400
    G4 P500
    G91 
    {% for y in range(1,14) %}
        G1 Y-1 F20000
#        G4 P50
        G1 Y1 F20000
#       G4 P50
    {% endfor %}
    G90

[gcode_macro MOVE_TO_TRASH]
description: Move toolhead to purge/trash bucket at X85 Y287.5 with safe approach path
gcode:
    # M1189 MOVE_TO_TRASH macro called!
#    _CG28
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S5000
    {% if (printer.gcode_move.position.y) > 270 %}
        {% if (printer.gcode_move.position.x) > 112 or (printer.gcode_move.position.x) < 85 %}
            G1 Y270 F20000
            G1 X85 F20000
            G1 Y270 F20000
            G1 Y287.5 F1500
        {% endif %}
        G1 X85 F20000
        G1 Y287.5 F1500
    {% else %}
        G1 X85 F20000
        G1 Y260 F20000
        G1 Y287.5 F1500
    {% endif %}

[gcode_macro EXTRUSION_AND_FLUSH]
description: Purge filament at trash position — 4 passes of 50mm extrusion with fan cooling, then wipe
gcode:
    M1189 EXTRUSION_AND_FLUSH macro called
    {% set hotendtemp = params.HOTEND|int %}
    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M83
    {% for i in range(4) %}
        G1 X{85 + i % 2 * 3} F5000
        {% for j in range(1,6) %}
            G1 E9 F300
            G1 E1 F50
        {% endfor %}
    {% endfor %}
    G1 E-1 F1800
    M400
    M106 S255
    M400
    G4 P5000
    CLEAR_OOZE
    CLEAR_FLUSH
    MOVE_TO_TRASH
    M106 S0


[gcode_macro PRINTER_PARAM]
description: Stores printer dimension constants used by other macros (build volume, clear/park positions)
variable_max_x_position: 270.0
variable_max_y_position: 270.0
variable_max_z_position: 260.0
variable_clear_x_position :88.0
variable_clear_y_position :287.0
gcode:

[gcode_macro _CG28]
description: Conditional G28 — only homes if not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}


[gcode_macro save_zoffset]
description: Save current Z offset to persistent variables (only if < 0.5mm for safety)
gcode:
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}

[gcode_macro set_zoffset]
description: Restore saved Z offset from persistent variables
gcode:
    {% set z = printer.save_variables.variables.z_offset|default(0) %}
    SET_GCODE_OFFSET Z={z} MOVE=0


[gcode_macro CLEAR_NOZZLE_PLR]
description: Simplified nozzle purge for power loss recovery — extrudes 80mm and wipes across brush
gcode:
    {% set hotendtemp = params.HOTEND|default(250)|int %}
    G91
    G1 Z{5} F900 
    G90

    MOVE_TO_TRASH

    M109 S{hotendtemp}

    G92 E0
    G1 E80 F400
    M106 S255

    G1 X115 F5000
    G1 X95 F15000
    G1 X115 F5000
    G1 X95 F15000
    G1 X115 F5000
    G1 X95 F15000
    G1 X115 F5000
    G1 X95 F15000
    G1 X125 F15000

[gcode_macro ENABLE_ALL_SENSOR]
description: Enable filament runout sensor
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=1

[gcode_macro DISABLE_ALL_SENSOR]
description: Disable filament runout sensor
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=0

[gcode_macro AUTOTUNE_SHAPERS]
description: Input shaper configuration — stores shaper type (ei) for auto-tuning
variable_autotune_shapers: 'ei'
gcode:

[gcode_macro M84]
description: Disable all stepper motors (override to explicitly disable each axis)
rename_existing:M84.1
gcode:
    M84.1
	SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=0
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=0
	SET_STEPPER_ENABLE STEPPER=extruder enable=0
	
[gcode_macro DETECT_INTERRUPTION]
description: Check if previous print was interrupted and prompt user to resume or clear
gcode:
    {% set was_interrupted = printer.save_variables.variables.was_interrupted %}
    {% if was_interrupted %}
        M1189 Detected unexpected interruption during the last print. Do you want to resume printing? (Do not move the extruder before resuming.)
        M1189 Yes: RESUME_INTERRUPTED
        M1189 No: CLEAR_LAST_FILE
    {% endif %}

[delayed_gcode PRINTER_INIT]
initial_duration:0.2
gcode:
    M1189 PRINTER_INIT Called!
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
    BED_MESH_CLEAR      
#    DETECT_INTERRUPTION
    DISABLE_ALL_SENSOR


[gcode_macro _HOME_X]
description: Sensorless home X axis — reduces current to 0.9A, homes, restores current, backs off 10mm
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 X
	SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR} 
    BEEP I=1 DUR=100   
    G91    
    G1 X-10 F3000
    G90

[gcode_macro _HOME_Y]
description: Sensorless home Y axis — reduces current to 0.9A, homes, restores current, backs off 10mm
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 Y
	SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR} 
    BEEP I=1 DUR=100   
    G91    
    G1 Y10 F3000
    G90    

[gcode_macro _HOME_XY]
description: Home both X and Y axes in Y-X-Y order for sensorless homing reliability
gcode:   
    _HOME_Y
    _HOME_X
    _HOME_Y


[homing_override]
axes:xyz
gcode:
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}              #
    {% set z_hop_speed = (printer.configfile.settings['stepper_z'].homing_speed * 60) | float %}    #
    {% set travel_speed = (printer.toolhead.max_velocity * 60) | float %}                           #
    {% set sensorless_variables = printer["gcode_macro _Sensorless_Homing_Variables"] %}            #
    {% set z_hop_distance = sensorless_variables.z_hop_distance | float %}                          # Collect all variables needed for sensorless homing
    {% set first_homed_axis = sensorless_variables.first_homed_axis | string %}                     # from machine config file and _Sensorless_Homing_Variables
    {% set safe_x = sensorless_variables.safe_x | float %}                                          #
    {% set safe_y = sensorless_variables.safe_y | float %}                                          #
    {% set safe_z = sensorless_variables.safe_z_enable | abs %}                                     #
    {% set chamber = printer["heater_generic chamber"].target|int %}

    {% if safe_x == -128 %}                                                                         #
        {% set safe_x = (printer.configfile.settings.stepper_x.position_max) /2 %}                  # If safe_x is '-128', set safe_x to the center of the X axis
    {% endif %}                                                                                     #

    {% if safe_y == -128 %}                                                                         #
        {% set safe_y = (printer.configfile.settings.stepper_y.position_max) /2 %}                  # If safe_y is '-128', set safe_y to the center of the Y axis
    {% endif %}                                                                                     #

    {% if z_hop_distance > 0 %}                                                                     # Check if z_hop_distance is greater than zero
      {% if 'x' not in printer.toolhead.homed_axes and 'y' not in printer.toolhead.homed_axes %}    # If X and Y are not homed, move Z to z_hop_distance
        SET_KINEMATIC_POSITION Z=0
        G0 Z{z_hop_distance} F{z_hop_speed}                                                         #
      {% endif %}                                                                                   #
    {% endif %}                                                                                     #

    {% if first_homed_axis == 'X' %}                                                                # If first_homed_axis is 'X', begin G28 param check
      {% if home_all or 'X' in params %}                                                            #
        _HOME_X                                                                                     # If home_all or 'X' is in params, home X
      {% endif %}                                                                                   #
      {% if home_all or 'Y' in params %}                                                            # If home_all or 'Y' in params, home Y
        _HOME_Y                                                                                     #
      {% endif %}                                                                                   #
    {% endif %}                                                                                     #

    {% if first_homed_axis == 'Y' %}                                                                # If first_homed_axis is 'Y', begin G28 param check
      {% if home_all or 'Y' in params %}                                                            #
        _HOME_Y                                                                                     # if home_all or 'Y' is in params, home Y
      {% endif %}                                                                                   #
      {% if home_all or 'X' in params %}                                                            # If home_all or 'X' in params, home X
        _HOME_X                                                                                     #
      {% endif %}                                                                                   #
    {% endif %}                                                                                     #

    {% if safe_z == 1 and (('Z' in params) or home_all) and ('Z' not in printer.toolhead.homed_axes) %}  # If safe_z is enabled, Z is to be homed, and Z is not homed
        {% if (printer.toolhead.position.z|float < 10) %}
            SET_KINEMATIC_POSITION Z=0
            G1 Z{z_hop_distance} F{z_hop_speed}
        {% endif %}
        G0 X{safe_x} Y{safe_y} F{travel_speed}                                                     # Move to safe XY position at travel speed
    {% endif %}                                                                                     #

    {% if home_all or 'Z' in params %}
        G90
        M106 S255  #Turn on part cooling fan to help cooldown nozzle
        M109 S150  #Heat/cooldown nozzle to 150c, prevents any filament from sticking to bed
        M106 S0    #Turn off part cooling fan, maybe helps remove noise from load cell
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0   #Turn off chamber heater, maybe helps reduce electrical noise from load cell
        SET_GCODE_OFFSET Z=0 MOVE=0
        {% set base_x  = printer['gcode_macro PRINTER_PARAM'].max_x_position/2 | float %}   #Randomize probe point
        {% set base_y  = printer['gcode_macro PRINTER_PARAM'].max_y_position/2 | float %}
        {% set safe_x  = range((base_x - 10)|int, (base_x + 10)|int + 1) | random %}
        {% set safe_y  = range((base_y - 10)|int, (base_y + 10)|int + 1) | random %}
        G0 X{safe_x} Y{safe_y} F7800
        G28 Z
        G1 Z20 F2000
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET={chamber}  #Restore chamber heater
    {% endif %}


# --- PAUSE & CANCEL (Extracted & adapted) ---
[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    
    {% if "xyz" in printer.toolhead.homed_axes %}
        M204 S10000  
        G90
        {% if (printer.gcode_move.position.z) < 100 %} G1 Z100 F600 {% endif %}
        {% if (printer.gcode_move.position.y) > printer['gcode_macro PRINTER_PARAM'].max_y_position %}
            G1 Y{printer['gcode_macro PRINTER_PARAM'].max_y_position - 50} F6000                                      
        {% endif %}
        G1 X85 F15000           
        G1 Y287.5 F3000     
    {% endif %}
    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
        BUFFER_MONITORING ENABLE=0
    {% endif %}
    M400
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    M106 P2 S0
    M106 P0 S0
    M106 P3 S0
    M104 S0
    M140 S0
    M141 S0
    DISABLE_BOX_HEATER
    M220 S100
    M221 S100
    M84
    DISABLE_ALL_SENSOR
    SET_GCODE_OFFSET Z=0 MOVE=0
    BED_MESH_CLEAR
    G31
    BEEP I=2 DUR=500
    BASE_CANCEL_PRINT
    CLEAR_LAST_FILE
    TIMELAPSE_RENDER
    M1188 Canceled print!

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set z = params.Z|default(5)|int %}
    {% if printer['pause_resume'].is_paused|int == 0 %}    
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE={z}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=etemp VALUE={printer['extruder'].target}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=efan VALUE={printer["fan_generic cooling_fan"].speed *255}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=echambertemp VALUE={printer['heater_generic chamber'].target}
        DISABLE_ALL_SENSOR
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
            BUFFER_MONITORING ENABLE=0
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSE              
        BASE_PAUSE
        {% if printer.extruder.can_extrude %}
            G92 E0
            G1 E-5 F1800
        {% endif %}
        {% if "z" in printer.toolhead.homed_axes and (printer.gcode_move.position.z + z ) < printer['gcode_macro PRINTER_PARAM'].max_z_position %}
            G91
            G1 Z{z} F900
        {% else %}
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE=0
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSEPARK
        {% if "xy"  in printer.toolhead.homed_axes %}
            G90
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
        {% endif %}
        M104 S0
        SET_IDLE_TIMEOUT TIMEOUT=259200
        SET_STEPPER_ENABLE STEPPER=extruder enable=0
        {% set slot_sync = printer.save_variables.variables.slot_sync|default("slot-1") %}
        {% if printer['box_stepper ' ~ slot_sync] %}
            SET_STEPPER_ENABLE STEPPER='box_stepper '{slot_sync} enable=0
        {% endif %}
    {% endif %}

[gcode_macro SHAPER_CALIBRATE]
description: Run input shaper calibration with 20-150Hz frequency range
rename_existing: RESHAPER_CALIBRATE
gcode:
    RESHAPER_CALIBRATE FREQ_START=20 FREQ_END=150
    

[gcode_macro RESUME_PRINT]
description: Resume print — reheat, purge filament, wipe at clear position, restore state. Handles Box tool change vs normal resume
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    G118 Macro RESUME_PRINT called
    {% set tool_change = params.TOOL_CHANGE|default(0)|int %}
    {% set e = params.E|default(60 if tool_change else 10)|int %}
    G118 RESUME_PRINT params: TOOL_CHANGE={tool_change} E={e} (E_param={params.E|default('unset')})

    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer.save_variables.variables.is_tool_change == 1 and printer["box_extras"]%}
            G118 RESUME_PRINT branch: BOX TOOL_CHANGE (no purge here, MOVE_TO_TRASH + BASE_RESUME)
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            MOVE_TO_TRASH
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            M83
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME
        {% else %}
            G118 RESUME_PRINT branch: NORMAL RESUME (purging {e}mm at clear position)
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %}
                SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% endif %}
            M83
            M106 S{efan}
            {% if echambertemp > 0 %}
                M141 S{echambertemp|int}
            {% endif %}
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
            {% if printer.extruder.can_extrude %}
                G118 RESUME_PRINT extruding {e}mm at F300
                G91
                G1  E{e} F300
                G90
            {% else %}
                G118 RESUME_PRINT skipping extrude (can_extrude=False, hotend too cold?)
            {% endif %}
            {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
                BUFFER_MONITORING ENABLE=1
            {% endif %}
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position - 50} F9000 
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME       
            {% if tool_change == 0 %}
                ENABLE_ALL_SENSOR
            {% endif %}
        {% endif %}
    {% endif %}
    

[gcode_macro RESUME]
description: Resume dispatcher — routes to TRY_RESUME_PRINT (Box enabled) or RESUME_PRINT (direct), checks filament loaded
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    G118 Macro RESUME called
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
            {% if printer.save_variables.variables.enable_box == 1 %}
                G118 Box Detected, calling TRY_RESUME_PRINT
                TRY_RESUME_PRINT
            {% else %}
                {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                    RESUME_PRINT
                {% else %}
                    M1189 Please load filament
                {% endif %}
            {% endif %}
        {% else %}
            {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                RESUME_PRINT
            {% else %}
                M1189 Please load filament
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro RESUME_1]
description: Secondary resume — calls RESUME_PRINT_1 with extruder temp for Box-enabled prints
gcode:
    G118 Macro RESUME_1 called
    {% set extruder_temp = params.EXTRUDER|default(240)|int %}
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
        {% if printer.save_variables.variables.enable_box == 1 %}
            RESUME_PRINT_1 S={extruder_temp}
        {% else %}
            {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
                M1189 Please load filament
            {% endif %}
        {% endif %}
    {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
            M1189 Please load filament
        {% endif %}
    {% endif %}

# --- MATERIAL DETECTION & FILTER SYSTEM ---
[gcode_macro SET_MATERIAL_VAR]
gcode:
    {% set mat = params.MATERIALS|default("PLA")|string %}
    SET_GCODE_VARIABLE MACRO=PRINT_END VARIABLE=active_materials VALUE="'{mat}'"

[delayed_gcode FILTER_STOP]
gcode:
    SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=0.0
    M117 Filtering finished.
    RESPOND TYPE=command MSG="Filter system: Cycle finished. Fan off."

[delayed_gcode FILTER_START_ACTION]
gcode:
    SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1.0
    M117 Filtering running (15 min)...
    RESPOND TYPE=command MSG="Cooldown phase finished. Starting active filtering (15min)."
    UPDATE_DELAYED_GCODE ID=FILTER_STOP DURATION=900

[gcode_macro MARK_TOOL_USED]
description: Registriert ein Tool als "benutzt" für die Sicherheits-Logik
gcode:
    {% set new_tool = params.TOOL|default(0)|int %}
    {% set used_list = printer["gcode_macro PRINT_END"].used_tools_list|default("") %}
    {% if not (new_tool|string in used_list.split(',')) %}
        {% if used_list == "" %}
            {% set new_list = new_tool|string %}
        {% else %}
            {% set new_list = used_list ~ "," ~ new_tool|string %}
        {% endif %}
        SET_GCODE_VARIABLE MACRO=PRINT_END VARIABLE=used_tools_list VALUE="'{new_list}'"
    {% endif %}

[delayed_gcode SMART_COOLING_MONITOR]
gcode:
    {% set target_temp = printer["gcode_macro PRINT_END"].cool_target|default(50)|int %}
    {% set current_chamber = printer["heater_generic chamber"].temperature|float %}
    {% if current_chamber > target_temp %}
        M117 Cooling: {current_chamber|round(1)}C / {target_temp}C
        UPDATE_DELAYED_GCODE ID=SMART_COOLING_MONITOR DURATION=30
    {% else %}
        M117 Temp safe. Filter an (15min).
        RESPOND MSG="Chamber auf {current_chamber|round(1)}C abgekühlt. Starte aktive Filterung."
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1.0
        UPDATE_DELAYED_GCODE ID=FILTER_STOP DURATION=900
    {% endif %}
    
# --- BOX HANDLING (Extracted from original) ---
[gcode_macro BOX_PRINT_START_2]
# rename_existing: BOX_PRINT_START
gcode:
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set hotendtemp = params.HOTENDTEMP|default(210)|int %}
    {% set last_load_slot = printer.save_variables.variables.last_load_slot|default("slot-1") %}
    {% set value_t = printer.save_variables.variables["value_t" ~ extruder]|default("slot" ~ extruder) %}
    
    {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
        {% if last_load_slot != value_t and last_load_slot != "slot-1" %}
             MOVE_TO_TRASH
             M83
             M109 S{hotendtemp}
             G1 E-1 F50
             CUT_FILAMENT
             MOVE_TO_TRASH
             M400
             EXTRUDER_UNLOAD SLOT={last_load_slot}
             T{extruder}
             G1 X85 F5000
             {% for i in range(4) %}
                G1 X{85 + i * 3} F5000
                {% for j in range(1,6) %}
                     G1 E9 F300
                     G1 E1 F50
                {% endfor %}
             {% endfor %}
             G1 E-1 F1800
             M400
             M106 S255
             G4 P5000
             CLEAR_OOZE
             CLEAR_FLUSH
             MOVE_TO_TRASH
             M106 S0
        {% endif %}
    {% else %}
         {% if last_load_slot != "slot-1" %}
            MOVE_TO_TRASH
            M109 S{hotendtemp}
            M400
            EXTRUDER_UNLOAD SLOT={last_load_slot}
            T{extruder}
            M83
            G1 X85 F5000
            {% for i in range(4) %}
                G1 X{85 + i * 3} F5000
                {% for j in range(1,6) %}
                    G1 E9 F300
                    G1 E1 F50
                {% endfor %}
            {% endfor %}
            G1 E-1 F1800
            M400
            M106 S255
            G4 P5000
            CLEAR_OOZE
            CLEAR_FLUSH
            MOVE_TO_TRASH
            M106 S0
        {% else %}
            MOVE_TO_TRASH
            M109 S{hotendtemp}
            T{extruder}
            M83
            G1 X85 F5000
            {% for i in range(4) %}
                G1 X{85 + i * 3} F5000
                {% for j in range(1,6) %}
                    G1 E9 F300
                    G1 E1 F50
                {% endfor %}
            {% endfor %}
            G1 E-1 F1800
            M400
            M106 S255
            G4 P5000
            CLEAR_OOZE
            CLEAR_FLUSH
            MOVE_TO_TRASH
            M106 S0
         {% endif %}
    {% endif %}



[gcode_macro M141]
description: Set chamber heater temperature (capped at 65C). Usage: M141 S<temp>
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET={([s, 65]|min)}
    {% endif %}


