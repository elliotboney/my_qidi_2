# ---- BOX_PRINT_START ----
# Function:  BoxExtras.cmd_BOX_PRINT_START @ 0x46724 (10428b)
# Purpose:   Initialize the box system at the start of a multi-material print.
#            Decides whether to unload current filament and load the
#            initial slot, or just load if nothing is loaded.
# Source strings (vaddr -> content) - the three branches:
#   0x76f60: "MOVE_TO_TRASH\nM109 S{temp}\nEXTRUDER_LOAD SLOT={init_load_slot}\n"
#            (load-only: no prior filament)
#   0x76f80: "MOVE_TO_TRASH\nM109 S{temp}\nM400\nCUT_FILAMENT\n"
#            "MOVE_TO_TRASH\nEXTRUDER_UNLOAD SLOT={unload_slot}\n"
#            "EXTRUDER_LOAD SLOT={init_load_slot}\n"
#            (with-cut: prior filament present, cut+swap)
#   0x77000: "MOVE_TO_TRASH\nM109 S{temp}\nM400\nEXTRUDER_UNLOAD SLOT={unload_slot}\n"
#            "EXTRUDER_LOAD SLOT={init_load_slot}\n"
#            (no-cut: prior filament present, swap without cut)
#   0x76e40: "INIT_RFID_READ\nM400\n"
[gcode_macro BOX_PRINT_START]
description: Box-system initialization at print start (RFID read, hotend warm, initial slot load).
gcode:
    {% set extruder = params.EXTRUDER | default(0) | int %}
    {% set hotendtemp = params.HOTENDTEMP | default(210) | int %}
    {% set temp = params.TEMP | default(hotendtemp) | int %}
    # init_load_slot resolved from EXTRUDER param via filament_slot mapping
    {% set init_load_slot = "slot" ~ extruder %}
    # last_load_slot read from save_variables - represents previously-loaded filament
    {% set last_load_slot = printer.save_variables.variables.last_load_slot | default("slot-1") %}
    # filament_detected - read from filament_switch_sensor at runtime
    {% set filament_detected = printer["filament_switch_sensor filament_switch_sensor"].filament_detected | default(False) %}

    # Python: validate enable_box; if not enabled, log
    #   "Not using BOX, not turning on the heater." and return.

    # Python: if currently drying, may stop drying first.
    # Python: set box_print_heat_state, init_slot, init_load_slot, selected_slot.

    # RFID identification of currently-loaded filament:
    INIT_RFID_READ
    M400

    {% if filament_detected and last_load_slot != init_load_slot and last_load_slot != "slot-1" %}
        # WITH-CUT branch (prior filament present, different from target)
        MOVE_TO_TRASH
        M109 S{temp}
        M400
        CUT_FILAMENT
        MOVE_TO_TRASH
        EXTRUDER_UNLOAD SLOT={last_load_slot}
        EXTRUDER_LOAD SLOT={init_load_slot}
    {% elif (not filament_detected) and last_load_slot != "slot-1" %}
        # NO-CUT branch (filament reportedly unloaded but slot still tracked)
        MOVE_TO_TRASH
        M109 S{temp}
        M400
        EXTRUDER_UNLOAD SLOT={last_load_slot}
        EXTRUDER_LOAD SLOT={init_load_slot}
    {% else %}
        # LOAD-ONLY branch (fresh start, no prior filament tracked)
        MOVE_TO_TRASH
        M109 S{temp}
        EXTRUDER_LOAD SLOT={init_load_slot}
    {% endif %}

    # Python: also runs INIT_BUFFER_STATE and INIT_SYNC_BUFFER_STATE
    # Python: sets is_tool_change = False
# CONFIDENCE: MEDIUM
# UNCERTAIN:
#   - Exact branch predicate. Three gcode templates exist; the analysis says
#     they are selected based on whether prior filament is present and
#     whether cutting is required. The user's smart_q2_macro.cfg uses
#     filament_switch_sensor + last_load_slot=="slot-1" as the discriminator,
#     which is a plausible reverse-engineered match.
#   - Whether {temp} is the hotend temp or a derived "swap temp" - the .so
#     formats {temp} at runtime so the source could be either.
#   - Whether INIT_RFID_READ runs unconditionally or only when no slot is
#     known yet.


