# ---- SLOT_PROMPT_MOVE ----
# Function:  BoxExtruderStepper.cmd_SLOT_PROMPT_MOVE @ 0x123a0 (2972b)
# Purpose:   "Shake the toolhead" - aggressive multi-amplitude X/Y oscillation
#            used to dislodge stuck filament or settle a freshly-loaded spool
#            in the buffer. This is the largest single embedded gcode blob
#            in the binary (742 bytes at 0x55140).
# Source strings (vaddr -> content):
#   0x55140 (742b): the full Y-then-X narrowing oscillation pattern (below)
#   0x55490 (31b):  "M204 S10000\nG1 X0 Y135 F15000\n"  (re-park used elsewhere)
#
# Movement pattern: starts with WIDE Y oscillations (Y200<->Y70, ~130mm
# amplitude at 500mm/s), then progressively narrows the amplitude
# (Y180<->Y90, Y160<->Y110, Y140<->Y130) - 18 Y-axis moves total. Then
# transitions via the back of the bed (Y270) to do the same narrowing
# pattern on the X axis (X200<->X70 narrowing to X140<->X130) - another
# 20 X-axis moves. Finally parks at center (X0 Y135). The narrowing
# amplitude creates a "vibration that converges" - probably designed to
# (a) shake free a tangled spool above the printer, or (b) seat filament
# in the buffer/PTFE path via inertia.
[gcode_macro SLOT_PROMPT_MOVE]
description: Aggressive narrowing X/Y toolhead oscillation - shakes filament free or seats it in the buffer.
