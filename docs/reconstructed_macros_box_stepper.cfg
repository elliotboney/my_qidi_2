    # ============================================================
    # Pre-check:
    #   if extrude_state != 'loaded':  QDE_004_007 "Extruder not loaded"
    # ============================================================

    # ---- Park over waste bin (literal from 0x55428) ----
    G1 Y270 F9000
    G1 X0 F9000
    G1 X0 Y17 F15000
    M400

    # ---- Tip-shape: short forward purge then small retract ----
    # The handler picks ONE of these two forward extrudes (analysis doc
    # mentions both). Best guess: "E25 F300" is the default; "E25 F600"
    # is used when buffer_enabled or for specific filament classes.
    M83
    G1 E25 F300
    # (alt: G1 E25 F600)
    G1 E-10 F300
    M400

