    # ---- Failure recovery (literal from 0x549c0) ----
    # Only emitted on the QDE_004_008/009/025 paths when the unload
    # could not verify clearance:
    #   CUT_FILAMENT
    #   MOVE_TO_TRASH
    # Then the handler prompts the user to manually re-issue
    # "EXTRUDER_UNLOAD SLOT=<slot>".

    # ============================================================
    # Post (success path):
    #   extrude_state = 'unloaded'
    #   if not slot_not_unload: slot_state stays 'loaded' (filament
    #     returned to hub, ready for next load)
    #   set_led(slot, NEUTRAL)
    # ============================================================
# CONFIDENCE: MEDIUM
# UNCERTAIN:
#   - Why three distinct error codes (008/009/025) for the same retry
#     prompt. Likely each maps to a different point in the multi-stage
#     unload (008 = stage 1 fail, 009 = stage 2 fail post-shake, 025 =
