#    multi-spool reload) via the "RELOAD_ALL RFID=1 FIRST=" template.
# 5. SLOT_RFID_READ -> box_rfid.so (start_rfid_read / stop_read /
#    card_reader API; not a gcode call but a Python API call).
# 6. The auto-reload path (runout_button_callback in box_stepper.so
#    indirectly through switch_next_slot) will issue PAUSE (string at
