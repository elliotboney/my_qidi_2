    # Mirror of EXTRUDER_LOAD's shake but with NEGATIVE extrusions.
    # Helps break a stubborn molten plug free of the extruder gears.
    M204 S10000
    M83
    G1 X0 Y200 F21000
    G1 P1000
    G1 X0 Y70 E-6.5 F30000
    G1 E-1 F60
    G1 X0 Y200 E-6.5 F30000
    G1 E-1 F60
    G1 X0 Y270 F21000
    G1 X200 F30000
    G1 X70 E-6.5 F30000
    G1 E-1 F60
    G1 X200 E-6.5 F30000
    G1 E-1 F60
    G1 X0 Y270 F21000
    G1 X0 Y135 F21000
    M400

    # ---- Stage EXTRUDER_UNLOAD2_ - clear extruder gears ----
    # Helper: __pyx_f_..._do_move(-extruder_unload_length_2, eul_2_speed,
    #         eul_2_accel). Verifies e_endstop has CLEARED.
    # On failure paths (3 distinct codes): QDE_004_008, _009, _025
    # Each prints: "Extruder unloading failure. Extruder unload again:
