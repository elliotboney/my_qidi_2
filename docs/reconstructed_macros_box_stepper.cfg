# ---- EXTRUDER_LOAD ----
# Function:  BoxExtruderStepper.cmd_EXTRUDER_LOAD @ 0x34984 (16860b in this
#            symbol; analysis doc reports 34912b for the full impl path)
# Purpose:   Load filament from the hub through the extruder to the nozzle,
#            with toolhead-shake assist and a final 150mm purge. This is
#            the load-half of a tool change.
# Source strings (vaddr -> content):
#   0x555b0 (241b): shake_for_load_toolhead (E+6.5 extrude during Y/X moves)
#   0x550b8 (88b):  final purge "G1 E150 F300\nG1 E-2 F1800\nM106 S255\n
#                   M400\nG4 P5000\nM106 S0\nCLEAR_FLUSH\nCLEAR_FLUSH\nM400\n"
#   0x55490 (31b):  "M204 S10000\nG1 X0 Y135 F15000\n"  (center park)
#   "EXTRUDER_LOAD1_" / "EXTRUDER_LOAD2_"  (stage labels for error reporting)
#   "RELOAD_ALL RFID=1 FIRST="  (callsite into box_extras when re-reading)
#
# 4-stage logical structure (per analysis doc, sec "cmd_EXTRUDER_LOAD"):
#   Pre:    parse SLOT, validate slot_state==loaded, extrude_state==unloaded,
#           check_wrapping_filament_state, sync_to_extruder
#   Stage 1 (EXTRUDER_LOAD1_):  feed extruder_load_length_1 at exl_1_speed
#                                until e_endstop triggers (Python do_move + do_home)
#   Stage 2 (EXTRUDER_LOAD2_):  feed extruder_load_length_2/3 to nozzle
#   Shake:  shake_for_load_toolhead - oscillates X/Y while extruding 6.5mm
#           per move to engage filament with extruder gears (string 0x555b0)
#   Purge:  150mm extrude, fan-cool 5s, double CLEAR_FLUSH (string 0x550b8)
#   Post:   center-park (string 0x55490), update extrude_state, last_load_slot
[gcode_macro EXTRUDER_LOAD]
description: Load filament from hub through extruder to nozzle, with shake assist and 150mm purge.
gcode:
    {% set slot = params.SLOT | default("") | string %}
    # ============================================================
    # Pre-checks (raise on failure; no gcode emitted on these paths):
    #   if extrude_state == 'loaded':      QDE_004_002 "Extruder has been loaded, cannot load %s"
    #   if slot_state[slot] != 'loaded':   QDE_004_005 "Please load the filament to %s first"
    #   if check_wrapping_filament_state:  QDE_004_013 "Detected wrapping filament"
    #   if filament already past extruder: QDE_004_011 "Detected that filament have been loaded, please unload first"
    #   if is_drying:                       blocks until drying state cleared
    # Python: sync_to_extruder() - links box stepper motion to extruder
    # ============================================================

    # ---- Stage 1: EXTRUDER_LOAD1_ - feed into extruder approach ----
    # Helper: __pyx_f_..._do_move(extruder_load_length_1, exl_1_speed,
    #         exl_1_accel) - drives box stepper into extruder gear path.
    #         No host-visible gcode is emitted by Stage 1.
    # On endstop-miss: raises QDE_004_006 "Extruder loading failure"
    #                   (sub-stage = "EXTRUDER_LOAD1_")

    # ---- Stage 2: EXTRUDER_LOAD2_ - through extruder gears to nozzle ----
    # Helper: __pyx_f_..._do_move(extruder_load_length_2/3, exl_2_speed,
    #         exl_2_accel) - drives stepper through extruder body.
    #         No host-visible gcode is emitted by Stage 2.
    # On failure: QDE_004_006 (sub-stage = "EXTRUDER_LOAD2_")

    # ---- Shake assist (literal from 0x555b0) ----
    # Oscillates X then Y while extruding 6.5mm per leg + 1mm slow
    # extrudes. Total extrusion during shake = ~30mm.
    M204 S10000
    M83
    G1 X0 Y200 F21000
    G1 P1000
    G1 X0 Y70 E6.5 F30000
    G1 E1 F60
    G1 X0 Y200 E6.5 F30000
    G1 E1 F60
    G1 X0 Y270 F21000
    G1 X200 F30000
    G1 X70 E6.5 F30000
    G1 E1 F60
    G1 X200 E6.5 F30000
    G1 E1 F60
    G1 X0 Y270 F21000
    G1 X0 Y135 F21000
    M400

    # ---- Final purge (literal from 0x550b8) ----
    # 150mm extrude at 5mm/s, retract 2mm, fan to 100% for 5s to cool
    # the purge string, then double CLEAR_FLUSH (defined in box_extras.so)
    # to wipe the bucket.
    G1 E150 F300
    G1 E-2 F1800
    M106 S255
    M400
    G4 P5000
    M106 S0
    CLEAR_FLUSH
    CLEAR_FLUSH
    M400

    # ---- Center re-park (literal from 0x55490) ----
    M204 S10000
    G1 X0 Y135 F15000

    # ============================================================
    # Post:
    #   extrude_state = 'loaded'
    #   last_load_slot = slot
    #   set_led(slot, GREEN_LOADED)
    #   May emit "RELOAD_ALL RFID=1 FIRST=<slot>" (string at 0x559a8) if
    #   the RFID-priority auto-reload path was taken (calls into box_extras).
    # ============================================================
# CONFIDENCE: HIGH
# UNCERTAIN:
#   - Stage 1 vs Stage 2 length parameters: the analysis doc says 3 stages
#     (length_1/2/3) but the error labels are only LOAD1_/LOAD2_. Likely
#     length_3 is folded into Stage 2's final approach, or used only when
#     buffer_enabled is true.
#   - Whether the shake sequence is unconditional or only fires when the
#     extruder endstop hasn't triggered after Stage 2 (i.e. a "filament
#     hasn't engaged yet, try shaking" recovery path). The 16860b function
#     size is consistent with a conditional shake, not unconditional.
#   - Whether a homing move (do_home against e_endstop) runs *before* or
#     *after* the shake. The analysis doc places homing before the shake,
#     but it's plausible a second home runs after to confirm engagement.
#   - The "RELOAD_ALL RFID=1 FIRST=" string suggests this handler can
#     trigger an RFID-priority reload of OTHER slots when the loaded
#     filament's tag indicates a multi-spool job - cross-module call into
#     box_extras.cmd_RELOAD_ALL.


